services:
  postgres:
    image: postgres:17-alpine
    container_name: crypto-postgres
    environment:
      POSTGRES_DB: crypto_bot
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d crypto_bot"]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    build: .
    container_name: crypto-collector
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -m scheduler

  web:
    build: .
    container_name: crypto-web
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: streamlit run interface/app.py --server.address 0.0.0.0 --server.port 8501

  discord-bot:
    build: .
    container_name: crypto-discord-bot
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -m bot_discord

volumes:
  pgdata:
